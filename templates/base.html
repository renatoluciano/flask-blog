<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Blog{% endblock %}</title>
    <!-- O Flask busca dinamicamente o arquivo CSS usando url_for -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container"> <!-- Container para centralizar tudo -->
        <header>
            <h1>Meu Blog Pessoal</h1>
            <nav>
                <a href="/">Início</a> | 
                <!-- Procure por essa linha no seu base.html e mude o href: -->
                <a href="{{ url_for('new_post') }}">Novo Post</a> | 
                <a href="#">Login</a>
            </nav>
        </header>
        
        <main>
            {% block content %}
            {% endblock %}
        </main>

        <footer>
            <p>&copy; 2026 - Desenvolvido em Flask</p>
        </footer>
    </div>
</body>
</html>
