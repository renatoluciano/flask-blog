<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Blog{% endblock %}</title>
    <!-- O Flask busca dinamicamente o arquivo CSS usando url_for -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container"> <!-- Container para centralizar tudo -->
        <header>
            <h1>Meu Blog Pessoal</h1>
           <nav>
                <a href="/">Início</a> | 
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('new_post') }}">Novo Post</a> | 
                    <span>Olá, {{ current_user.username }}</span> | 
                    <a href="{{ url_for('logout') }}">Sair</a>
                {% else %}
                    <a href="{{ url_for('register') }}">Cadastrar</a> | 
                    <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
            </nav>
        </header>
        
        <main>
            {% block content %}
            {% endblock %}
        </main>

        <footer>
            <p>&copy; 2026 - Desenvolvido em Flask</p>
        </footer>
    </div>
</body>
</html>
