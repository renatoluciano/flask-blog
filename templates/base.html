<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Blog{% endblock %}</title>
</head>
<body>
    <header>
        <h1>Nav - Meu Blog Pessoal</h1>
        <nav>
            <a href="/">Início</a> | 
            <a href="#">Novo Post</a> | 
            <a href="#">Login</a>
        </nav>
        <hr>
    </header>
    
    <main>
        <!-- O conteúdo específico de cada página vai entrar aqui dentro -->
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 - Desenvolvido em Flask</p>
    </footer>
</body>
</html>
