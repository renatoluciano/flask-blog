{% extends "base.html" %}

{% block title %}Página Inicial - Meu Blog{% endblock %}

{% block content %}
    <h1>Últimas Postagens</h1>
    
    {% for post in posts %}
        <div class="post-card">
            <h2>{{ post.titulo }}</h2>
            <p>{{ post.conteudo }}</p>
            
            <!-- Links de Ação baseados no ID do post -->
            <div style="margin-top: 15px; font-size: 0.9rem;">
                <a href="{{ url_for('edit_post', post_id=post.id) }}" style="color: #ffc107; text-decoration: none; margin-right: 15px; font-weight: bold;">Editar</a>
                <a href="{{ url_for('delete_post', post_id=post.id) }}" style="color: #dc3545; text-decoration: none; font-weight: bold;" onclick="return confirm('Tem certeza que deseja excluir este post?');">Excluir</a>
            </div>
        </div>
    {% else %}
        <p>Nenhum post encontrado. Seja o primeiro a criar um!</p>
    {% endfor %}
{% endblock %}
