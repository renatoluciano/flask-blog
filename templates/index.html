{% extends "base.html" %}

{% block title %}Página Inicial - Meu Blog{% endblock %}

{% block content %}
    <h1>Últimas Postagens</h1>
    
    <!-- O Jinja vai repetir este bloco para cada post encontrado no banco -->
    {% for post in posts %}
        <div class="post-card">
            <h2>{{ post.titulo }}</h2>
            <p>{{ post.conteudo }}</p>
        </div>
    {% else %}
        <p>Nenhum post encontrado. Seja o primeiro a criar um!</p>
    {% endfor %}
{% endblock %}
