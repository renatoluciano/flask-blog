{% extends "base.html" %}

{% block title %}Editar Post - Meu Blog{% endblock %}

{% block content %}
<div class="post-card">
    <h2>Editar Post</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label for="titulo" style="display: block; font-weight: bold; margin-bottom: 5px;">Título:</label>
            <input type="text" id="titulo" name="titulo" value="{{ post.titulo }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="conteudo" style="display: block; font-weight: bold; margin-bottom: 5px;">Conteúdo:</label>
            <textarea id="conteudo" name="conteudo" rows="6" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical;">{{ post.conteudo }}</textarea>
        </div>
        
        <button type="submit" style="background-color: #0d6efd; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 4px; cursor: pointer;">Salvar Alterações</button>
        <a href="/" style="margin-left: 10px; color: #6c757d; text-decoration: none;">Cancelar</a>
    </form>
</div>
{% endblock %}
